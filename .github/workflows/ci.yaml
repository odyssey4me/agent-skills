name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov=skills \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-fail-under=80

  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Validate skill structure
        run: uv run python scripts/validate_skill.py skills/*

  skillsaw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: stbenjam/skillsaw@v0
        with:
          strict: true

  test-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Test skill execution
        run: |
          # Test each skill has valid syntax, --help works, and check command exists
          for skill in skills/*/; do
            skill_script=$(find "$skill/scripts" -name "*.py" -not -name "__init__.py" | head -1)
            if [ -n "$skill_script" ]; then
              echo "Testing $skill_script"
              uv run python "$skill_script" --help
              uv run python "$skill_script" check || true  # May fail if not configured, that's ok
            fi
          done
