name: Validate gogcli

on:
  pull_request:
    paths:
      - skills/google/SKILL.md

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Read pinned version
        id: deps
        run: |
          version=$(grep 'gogcli-version:' skills/google/SKILL.md | sed 's/.*"\(.*\)"/\1/')
          repo=$(grep 'gogcli-repository:' skills/google/SKILL.md | awk '{print $2}')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "gogcli version: ${version}, repo: ${repo}"

      - name: Fetch release checksums
        run: |
          version="${{ steps.deps.outputs.version }}"
          repo="${{ steps.deps.outputs.repo }}"
          curl -fsSL \
            "https://github.com/${repo}/releases/download/v${version}/checksums.txt" \
            -o /tmp/checksums.txt
          cat /tmp/checksums.txt

      - name: Download and verify release tarball
        run: |
          version="${{ steps.deps.outputs.version }}"
          repo="${{ steps.deps.outputs.repo }}"
          curl -fsSL \
            "https://github.com/${repo}/releases/download/v${version}/gogcli_${version}_linux_amd64.tar.gz" \
            -o /tmp/gogcli.tar.gz
          actual=$(sha256sum /tmp/gogcli.tar.gz | awk '{print $1}')
          expected=$(awk -v name="gogcli_${version}_linux_amd64.tar.gz" '$2 == name {print $1}' /tmp/checksums.txt)
          if [ "$actual" != "$expected" ]; then
            echo "::error::Checksum mismatch! Expected: ${expected}, Got: ${actual}"
            exit 1
          fi
          echo "Checksum verified: ${actual}"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "stable"

      - name: Clone gogcli source
        run: |
          git clone --depth=1 --branch "v${{ steps.deps.outputs.version }}" \
            "https://github.com/${{ steps.deps.outputs.repo }}.git" /tmp/gogcli-src

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd /tmp/gogcli-src
          govulncheck ./...
