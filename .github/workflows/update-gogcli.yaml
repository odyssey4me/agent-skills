name: Update gogcli

on:
  schedule:
    - cron: "23 8 * * 1"  # Weekly on Monday at 08:23 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read current version
        id: current
        run: |
          version=$(jq -r '.gogcli.version' skills/google/dependencies.json)
          repo=$(jq -r '.gogcli.repository' skills/google/dependencies.json)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      - name: Check latest release
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh api "repos/${{ steps.current.outputs.repo }}/releases/latest" --jq '.tag_name' | sed 's/^v//')
          echo "version=${latest}" >> "$GITHUB_OUTPUT"
          if [ "$latest" = "${{ steps.current.outputs.version }}" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download checksums
        if: steps.latest.outputs.up_to_date == 'false'
        run: |
          version="${{ steps.latest.outputs.version }}"
          repo="${{ steps.current.outputs.repo }}"
          curl -fsSL \
            "https://github.com/${repo}/releases/download/v${version}/checksums.txt" \
            -o /tmp/checksums.txt
          cat /tmp/checksums.txt

      - name: Update dependencies.json
        if: steps.latest.outputs.up_to_date == 'false'
        run: |
          version="${{ steps.latest.outputs.version }}"
          checksums_file="/tmp/checksums.txt"

          get_sha() {
            grep "$1" "$checksums_file" | awk '{print $1}'
          }

          jq \
            --arg ver "$version" \
            --arg linux_amd64 "$(get_sha "gogcli_${version}_linux_amd64.tar.gz")" \
            --arg linux_arm64 "$(get_sha "gogcli_${version}_linux_arm64.tar.gz")" \
            --arg darwin_amd64 "$(get_sha "gogcli_${version}_darwin_amd64.tar.gz")" \
            --arg darwin_arm64 "$(get_sha "gogcli_${version}_darwin_arm64.tar.gz")" \
            --arg windows_amd64 "$(get_sha "gogcli_${version}_windows_amd64.zip")" \
            --arg windows_arm64 "$(get_sha "gogcli_${version}_windows_arm64.zip")" \
            '.gogcli.version = $ver |
             .gogcli.validated = null |
             .gogcli.checksums = {
               ("gogcli_" + $ver + "_linux_amd64.tar.gz"): $linux_amd64,
               ("gogcli_" + $ver + "_linux_arm64.tar.gz"): $linux_arm64,
               ("gogcli_" + $ver + "_darwin_amd64.tar.gz"): $darwin_amd64,
               ("gogcli_" + $ver + "_darwin_arm64.tar.gz"): $darwin_arm64,
               ("gogcli_" + $ver + "_windows_amd64.zip"): $windows_amd64,
               ("gogcli_" + $ver + "_windows_arm64.zip"): $windows_arm64
             }' \
            skills/google/dependencies.json > /tmp/deps.json
          mv /tmp/deps.json skills/google/dependencies.json

      - name: Create or update pull request
        if: steps.latest.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.latest.outputs.version }}"
          branch="deps/gogcli-update"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for existing open PR on the update branch
          existing_pr=$(gh pr list --head "${branch}" --state open --json number --jq '.[0].number // empty')

          if [ -n "$existing_pr" ]; then
            # Update the existing branch and PR
            git fetch origin "${branch}" 2>/dev/null || true
            git checkout -B "${branch}" origin/main
            git add skills/google/dependencies.json
            git commit -m "chore(google): update gogcli to v${version}"
            git push -f origin "${branch}"
            gh pr edit "$existing_pr" \
              --title "chore(google): update gogcli to v${version}" \
              --body "$(cat <<EOF
          ## Summary

          Updates gogcli dependency from v${{ steps.current.outputs.version }} to v${version}.

          Release: https://github.com/${{ steps.current.outputs.repo }}/releases/tag/v${version}

          ## Validation

          The \`validate-gogcli\` workflow will run automatically on this PR to:
          - Verify release checksum integrity
          - Run \`govulncheck\` for known vulnerabilities
          - Run \`gosec\` for security issues
          - Run \`go vet\` for correctness

          Merge only after all checks pass.
          EOF
          )"
            echo "Updated existing PR #${existing_pr}"
          else
            # Create new branch and PR
            git checkout -b "${branch}"
            git add skills/google/dependencies.json
            git commit -m "chore(google): update gogcli to v${version}"
            git push -u origin "${branch}"
            gh pr create \
              --title "chore(google): update gogcli to v${version}" \
              --body "$(cat <<EOF
          ## Summary

          Updates gogcli dependency from v${{ steps.current.outputs.version }} to v${version}.

          Release: https://github.com/${{ steps.current.outputs.repo }}/releases/tag/v${version}

          ## Validation

          The \`validate-gogcli\` workflow will run automatically on this PR to:
          - Verify release checksum integrity
          - Run \`govulncheck\` for known vulnerabilities
          - Run \`gosec\` for security issues
          - Run \`go vet\` for correctness

          Merge only after all checks pass.
          EOF
          )" \
              --label "dependencies"
          fi
